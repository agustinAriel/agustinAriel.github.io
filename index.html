<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Agenda — Facu & Trabajo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════ TOKENS */
:root {
  --work:      #3b82f6; --work-s:     #60a5fa;
  --algebra:   #8b5cf6; --algebra-s:  #a78bfa;
  --analisis:  #10b981; --analisis-s: #34d399;
  --datos:     #f59e0b; --datos-s:    #fbbf24;
  --fisica:    #ef4444; --fisica-s:   #f87171;
  --exam:      #ec4899; --exam-s:     #f472b6;
  --r: 10px; --r-lg: 14px;
}
[data-theme="dark"] {
  --bg:#0f0f13; --bg2:#16161d; --bg3:#1d1d26;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --text:#f0eeff; --text2:#9892b0; --text3:#3e3a58;
  --shadow:0 8px 32px rgba(0,0,0,0.6);
}
[data-theme="light"] {
  --bg:#f4f2ee; --bg2:#ffffff; --bg3:#ede9e2;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.16);
  --text:#18161f; --text2:#6b6580; --text3:#c0bcd0;
  --shadow:0 8px 32px rgba(0,0,0,0.1);
}

/* ════════════════════════ RESET */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;transition:background .25s,color .25s;}
button{cursor:pointer;font-family:inherit;}
input,textarea,select{font-family:inherit;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ════════════════════════ TOPBAR */
.topbar{
  position:sticky;top:0;z-index:300;
  height:54px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.25rem;gap:10px;
  transition:background .25s;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-.04em;color:var(--text);flex:1;}
.logo span{color:var(--algebra-s);}
.tb-mid{font-size:12px;color:var(--text2);font-family:'Syne',sans-serif;letter-spacing:.01em;}
.tb-mid strong{color:var(--text);font-weight:700;}
.icon-btn{
  width:32px;height:32px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2);}

/* ════════════════════════ LAYOUT */
.layout{display:grid;grid-template-columns:272px 1fr;height:calc(100vh - 54px);}
@media(max-width:760px){.layout{grid-template-columns:1fr;height:auto;}}

/* ════════════════════════ SIDEBAR */
.sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1.5rem;
  transition:background .25s;
}
@media(max-width:760px){.sidebar{border-right:none;border-bottom:1px solid var(--border);}}
.sec-lbl{
  font-family:'Syne',sans-serif;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:9px;
}

/* ── Mini Calendar */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.cal-m-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:-.03em;}
.nav-pair{display:flex;gap:3px;}
.nav-b{
  width:24px;height:24px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text2);font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.nav-b:hover{background:var(--bg3);color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{
  font-family:'Syne',sans-serif;font-size:9px;font-weight:700;
  color:var(--text3);text-align:center;padding:2px 0 5px;letter-spacing:.05em;
}
.cal-cell{
  position:relative;border-radius:7px;cursor:pointer;overflow:hidden;
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  transition:all .12s;border:1.5px solid transparent;
}
.cal-cell:hover{border-color:var(--border2);}
.cal-cell.other{opacity:.28;}
.cal-cell.is-today{border-color:var(--text2)!important;}
.cal-cell.is-sel{border-color:var(--algebra-s)!important;box-shadow:0 0 0 2px rgba(139,92,246,.25);}
.cal-num{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  color:var(--text);padding:3px 0 0;z-index:1;line-height:1;
}
.cal-cell.other .cal-num{color:var(--text3);}
.cal-stripes{display:flex;width:100%;flex:1;gap:1px;padding:1px 3px 3px;align-items:flex-end;}
.cal-stripe{flex:1;border-radius:2px;min-height:5px;max-height:14px;}
.edot{position:absolute;top:2px;right:3px;width:5px;height:5px;background:var(--exam-s);border-radius:50%;}
.ndot{position:absolute;top:2px;right:10px;width:5px;height:5px;background:var(--datos-s);border-radius:50%;}

/* ── Legend */
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.leg-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}

/* ── Exams list */
.exam-list{display:flex;flex-direction:column;gap:5px;}
.echip{
  display:flex;align-items:center;gap:8px;
  padding:7px 9px;border-radius:8px;
  border:1px solid rgba(236,72,153,.2);background:rgba(236,72,153,.07);
  cursor:pointer;transition:all .12s;
}
.echip:hover{border-color:var(--exam-s);}
.echip-date{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;color:var(--exam-s);min-width:32px;}
.echip-name{font-size:11px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cdel{background:none;border:none;color:var(--text3);font-size:12px;line-height:1;transition:color .12s;flex-shrink:0;}
.cdel:hover{color:var(--exam-s);}
.empty-msg{font-size:11px;color:var(--text3);font-style:italic;}

/* ════════════════════════ MAIN */
.main-panel{overflow-y:auto;display:flex;flex-direction:column;background:var(--bg);transition:background .25s;}

/* Mobile day nav */
.mob-nav{
  display:none;align-items:center;justify-content:space-between;
  padding:8px 1.25rem;background:var(--bg2);border-bottom:1px solid var(--border);
}
@media(max-width:760px){.mob-nav{display:flex;} .tb-mid{display:none;}}
.mob-nav-b{
  width:30px;height:30px;border:1px solid var(--border);border-radius:7px;
  background:transparent;color:var(--text2);font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.mob-nav-b:hover{background:var(--bg3);color:var(--text);}
.mob-lbl{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:-.02em;}

/* Day header */
.day-hdr{
  padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:10px;background:var(--bg2);transition:background .25s;
  position:sticky;top:0;z-index:100;
}
@media(max-width:760px){.day-hdr{padding:1rem;}}
.day-name-big{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,4vw,1.85rem);font-weight:800;letter-spacing:-.04em;line-height:1;}
.day-date-sub{font-size:12px;color:var(--text2);margin-top:3px;font-family:'Syne',sans-serif;}
.day-btns{display:flex;gap:7px;flex-wrap:wrap;}
.dbtn{
  font-size:12px;font-weight:500;padding:7px 13px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  display:flex;align-items:center;gap:5px;transition:all .12s;
}
.dbtn:hover{color:var(--text);border-color:var(--border2);}
.dbtn-exam{border-color:rgba(236,72,153,.3);color:var(--exam-s);background:rgba(236,72,153,.07);}
.dbtn-exam:hover{border-color:var(--exam-s);background:rgba(236,72,153,.14);}
.dbtn-note{border-color:rgba(245,158,11,.3);color:var(--datos-s);background:rgba(245,158,11,.07);}
.dbtn-note:hover{border-color:var(--datos-s);background:rgba(245,158,11,.14);}

/* Day content */
.day-content{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:10px;}
@media(max-width:760px){.day-content{padding:1rem;}}

/* Note card */
.note-card{
  border-radius:var(--r-lg);border:1px solid rgba(245,158,11,.3);
  background:rgba(245,158,11,.07);padding:12px 14px;
}
.note-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.note-lbl{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--datos-s);}
.note-del-b{background:none;border:none;color:var(--text3);font-size:13px;transition:color .12s;}
.note-del-b:hover{color:var(--datos-s);}
.note-ta{width:100%;background:transparent;border:none;outline:none;resize:none;color:var(--text);font-size:13px;line-height:1.6;min-height:52px;}
.note-ta::placeholder{color:var(--text3);}

/* Exam alert */
.exam-alert{
  border-radius:var(--r-lg);border:1px solid rgba(236,72,153,.3);
  border-left:3px solid var(--exam-s);background:rgba(236,72,153,.07);
  padding:11px 14px;display:flex;align-items:center;gap:10px;
}
.ea-icon{font-size:18px;flex-shrink:0;}
.ea-info{flex:1;min-width:0;}
.ea-lbl{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--exam-s);}
.ea-name{font-size:13px;font-weight:500;margin-top:2px;}
.ea-del{background:none;border:none;color:var(--text3);font-size:14px;transition:color .12s;}
.ea-del:hover{color:var(--exam-s);}

/* Schedule section */
.sched-title{
  font-family:'Syne',sans-serif;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--text3);
  margin-bottom:8px;margin-top:4px;
}

/* Schedule cards */
.sched-card{
  border-radius:var(--r);padding:11px 14px;
  display:flex;align-items:center;gap:11px;
  position:relative;overflow:hidden;
  transition:transform .12s;
}
.sched-card:hover{transform:translateX(4px);}
.sched-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.sc-icon{font-size:17px;flex-shrink:0;}
.sc-body{flex:1;min-width:0;}
.sc-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-sub{font-size:11px;margin-top:1px;}
.sc-time{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  white-space:nowrap;flex-shrink:0;
}
.sc-tag{
  font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;flex-shrink:0;
}
@media(max-width:480px){.sc-tag{display:none;}}

/* Card variants */
.cw{background:rgba(59,130,246,.1);}
.cw::before{background:var(--work-s);}
.cw .sc-title,.cw .sc-time{color:var(--work-s);}
.cw .sc-sub{color:color-mix(in srgb,var(--work-s) 60%,var(--text2));}
.cw .sc-tag{background:rgba(59,130,246,.18);color:var(--work-s);}

.ca{background:rgba(139,92,246,.1);}
.ca::before{background:var(--algebra-s);}
.ca .sc-title,.ca .sc-time{color:var(--algebra-s);}
.ca .sc-sub{color:color-mix(in srgb,var(--algebra-s) 60%,var(--text2));}
.ca .sc-tag{background:rgba(139,92,246,.18);color:var(--algebra-s);}

.cm{background:rgba(16,185,129,.1);}
.cm::before{background:var(--analisis-s);}
.cm .sc-title,.cm .sc-time{color:var(--analisis-s);}
.cm .sc-sub{color:color-mix(in srgb,var(--analisis-s) 60%,var(--text2));}
.cm .sc-tag{background:rgba(16,185,129,.18);color:var(--analisis-s);}

.cd{background:rgba(245,158,11,.1);}
.cd::before{background:var(--datos-s);}
.cd .sc-title,.cd .sc-time{color:var(--datos-s);}
.cd .sc-sub{color:color-mix(in srgb,var(--datos-s) 60%,var(--text2));}
.cd .sc-tag{background:rgba(245,158,11,.18);color:var(--datos-s);}

.cf{background:rgba(239,68,68,.1);}
.cf::before{background:var(--fisica-s);}
.cf .sc-title,.cf .sc-time{color:var(--fisica-s);}
.cf .sc-sub{color:color-mix(in srgb,var(--fisica-s) 60%,var(--text2));}
.cf .sc-tag{background:rgba(239,68,68,.18);color:var(--fisica-s);}

.free-day{padding:3rem;text-align:center;color:var(--text3);font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:-.01em;}

/* ════════════════════════ MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:1.5rem;width:100%;max-width:350px;box-shadow:var(--shadow);transition:background .25s;
}
.modal-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:-.03em;margin-bottom:1.1rem;}
.mfield{margin-bottom:12px;}
.mfield label{display:block;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:5px;}
.mfield input{
  width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:8px;
  background:var(--bg3);color:var(--text);font-size:13px;outline:none;
  transition:border-color .15s;
}
.mfield input:focus{border-color:var(--algebra-s);}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.mbtn{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;border:1px solid var(--border);transition:all .12s;}
.mbtn-c{background:transparent;color:var(--text2);}
.mbtn-c:hover{background:var(--bg3);}
.mbtn-s{background:var(--text);color:var(--bg);border-color:var(--text);}
.mbtn-s:hover{opacity:.85;}

@keyframes up{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.sched-card,.note-card,.exam-alert{animation:up .18s ease both;}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">mi<span>agenda</span></div>
  <div class="tb-mid" id="tb-mid"></div>
  <div style="display:flex;gap:7px;align-items:center;">
    <button class="icon-btn" id="today-btn" title="Ir a hoy" style="font-size:11px;font-family:'Syne',sans-serif;font-weight:700;width:auto;padding:0 10px;letter-spacing:.03em;">HOY</button>
    <button class="icon-btn" id="theme-btn" title="Cambiar tema">☀</button>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <!-- Calendar -->
    <div>
      <div class="cal-nav-row">
        <span class="cal-m-title" id="cal-title"></span>
        <div class="nav-pair">
          <button class="nav-b" id="prev-m">‹</button>
          <button class="nav-b" id="next-m">›</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Legend -->
    <div>
      <div class="sec-lbl">Materias</div>
      <div class="leg-grid">
        <div class="leg"><div class="leg-dot" style="background:var(--work-s)"></div>Trabajo</div>
        <div class="leg"><div class="leg-dot" style="background:var(--algebra-s)"></div>Álgebra</div>
        <div class="leg"><div class="leg-dot" style="background:var(--analisis-s)"></div>An. Mat.</div>
        <div class="leg"><div class="leg-dot" style="background:var(--datos-s)"></div>An. Datos</div>
        <div class="leg"><div class="leg-dot" style="background:var(--fisica-s)"></div>Física</div>
        <div class="leg"><div class="leg-dot" style="background:var(--exam-s)"></div>Examen</div>
      </div>
    </div>

    <!-- Exams -->
    <div>
      <div class="sec-lbl">Próximos exámenes</div>
      <div class="exam-list" id="sb-exams"></div>
    </div>
  </aside>

  <main class="main-panel">
    <div class="mob-nav">
      <button class="mob-nav-b" id="mob-prev">‹</button>
      <span class="mob-lbl" id="mob-lbl"></span>
      <button class="mob-nav-b" id="mob-next">›</button>
    </div>

    <div class="day-hdr">
      <div>
        <div class="day-name-big" id="d-name"></div>
        <div class="day-date-sub" id="d-date"></div>
      </div>
      <div class="day-btns">
        <button class="dbtn dbtn-exam" onclick="openExamModal()">＋ Examen</button>
        <button class="dbtn dbtn-note" onclick="toggleNote()">＋ Nota</button>
      </div>
    </div>

    <div class="day-content" id="day-content"></div>
  </main>
</div>

<!-- Modal -->
<div class="overlay" id="exam-modal">
  <div class="modal">
    <div class="modal-title">Nuevo examen</div>
    <div class="mfield">
      <label>Materia / descripción</label>
      <input type="text" id="ex-name" placeholder="ej: Álgebra — Parcial 1"/>
    </div>
    <div class="mfield">
      <label>Fecha</label>
      <input type="date" id="ex-date"/>
    </div>
    <div class="mbtns">
      <button class="mbtn mbtn-c" onclick="closeModal()">Cancelar</button>
      <button class="mbtn mbtn-s" onclick="saveExam()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SCHED = {
  1:[{s:12,e:15,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno almuerzo",tag:"Almuerzo"},
     {s:16,e:19,t:"ca",ic:"📐",ti:"Álgebra",sub:"Bloque de estudio fijo",tag:"Estudio"},
     {s:20,e:23,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno cena",tag:"Cena"}],
  2:[{s:12,e:15,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno almuerzo",tag:"Almuerzo"},
     {s:17,e:20,t:"cm",ic:"📈",ti:"Análisis Matemático",sub:"Cursada",tag:"Cursada"},
     {s:20,e:21,t:"cd",ic:"📊",ti:"Análisis de Datos",sub:"Cursada",tag:"Cursada"},
     {s:21.5,e:23.5,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno cena",tag:"Cena"}],
  3:[{s:7, e:10,t:"cf",ic:"⚡",ti:"Física",sub:"Cursada",tag:"Cursada"},
     {s:12,e:15,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno almuerzo",tag:"Almuerzo"},
     {s:17,e:20,t:"cm",ic:"📈",ti:"Análisis Matemático",sub:"Cursada",tag:"Cursada"},
     {s:20.5,e:23.5,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno cena",tag:"Cena"}],
  4:[{s:12,e:15,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno almuerzo",tag:"Almuerzo"},
     {s:15.5,e:18.5,t:"ca",ic:"📐",ti:"Álgebra",sub:"Bloque de estudio fijo",tag:"Estudio"},
     {s:19,e:21,t:"cd",ic:"📊",ti:"Análisis de Datos",sub:"Cursada",tag:"Cursada"},
     {s:21.25,e:23.25,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno cena",tag:"Cena"}],
  5:[{s:12,e:15,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno almuerzo",tag:"Almuerzo"},
     {s:17,e:20,t:"cm",ic:"📈",ti:"Análisis Matemático",sub:"Cursada",tag:"Cursada"},
     {s:20.5,e:23.5,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno cena",tag:"Cena"}],
  6:[{s:7, e:10,t:"cf",ic:"⚡",ti:"Física",sub:"Cursada",tag:"Cursada"},
     {s:12,e:16,t:"cw",ic:"💼",ti:"Trabajo",sub:"Franja extendida",tag:"Extendido"},
     {s:20,e:24,t:"cw",ic:"💼",ti:"Trabajo",sub:"Turno cena / noche",tag:"Noche"}],
  0:[]
};

const DOW_COLS = {
  1:["work","algebra","work"],
  2:["work","analisis","datos","work"],
  3:["fisica","work","analisis","work"],
  4:["work","algebra","datos","work"],
  5:["work","analisis","work"],
  6:["fisica","work","work"],
  0:[]
};
const COL_VAR = {work:"var(--work-s)",algebra:"var(--algebra-s)",analisis:"var(--analisis-s)",datos:"var(--datos-s)",fisica:"var(--fisica-s)"};
const DAY_N  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MON_N  = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MON_S  = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

function loadSt(){ try{return JSON.parse(localStorage.getItem("ag3")||"{}");}catch{return{};} }
function saveSt(){ localStorage.setItem("ag3",JSON.stringify(st)); }

let st = loadSt();
if(!st.exams) st.exams={};
if(!st.notes) st.notes={};

const today = new Date();
let sel = new Date(today);
let calY = today.getFullYear(), calM = today.getMonth();
let darkMode = localStorage.getItem("ag3_theme") !== "light";
applyTheme();

function dkey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmt(h){ const hh=Math.floor(h),mm=Math.round((h%1)*60); return (hh===24?"00":String(hh).padStart(2,"0"))+":"+String(mm).padStart(2,"0"); }
function fmtS(k){ const[,m,d]=k.split("-"); return d+" "+MON_S[parseInt(m)-1]; }
function uniqCols(dow){ const s=new Set(),o=[]; (DOW_COLS[dow]||[]).forEach(c=>{if(!s.has(c)){s.add(c);o.push(c);}}); return o; }

/* ── Calendar */
function renderCal(){
  document.getElementById("cal-title").textContent = MON_N[calM]+" "+calY;
  const g = document.getElementById("cal-grid");
  g.innerHTML = "";
  ["LU","MA","MI","JU","VI","SÁ","DO"].forEach(d=>{
    const e=document.createElement("div"); e.className="cal-dow"; e.textContent=d; g.appendChild(e);
  });
  const first = new Date(calY,calM,1);
  const startDow = (first.getDay()+6)%7;
  const dim  = new Date(calY,calM+1,0).getDate();
  const dimp = new Date(calY,calM,0).getDate();

  for(let i=startDow-1;i>=0;i--){
    const e=document.createElement("div"); e.className="cal-cell other";
    e.innerHTML=`<span class="cal-num">${dimp-i}</span><div class="cal-stripes"></div>`;
    g.appendChild(e);
  }
  for(let d=1;d<=dim;d++){
    const date=new Date(calY,calM,d), key=dkey(date), dow=date.getDay();
    const isT=dkey(today)===key, isS=dkey(sel)===key;
    const hasE=st.exams[key]&&st.exams[key].length>0;
    const hasN=st.notes[key]&&st.notes[key].trim().length>0;
    const el=document.createElement("div"); el.className="cal-cell";
    if(isT) el.classList.add("is-today");
    if(isS) el.classList.add("is-sel");
    const num=document.createElement("span"); num.className="cal-num"; num.textContent=d; el.appendChild(num);
    const stripes=document.createElement("div"); stripes.className="cal-stripes";
    uniqCols(dow).forEach(c=>{ const s=document.createElement("div"); s.className="cal-stripe"; s.style.background=COL_VAR[c]; s.style.opacity=".8"; stripes.appendChild(s); });
    el.appendChild(stripes);
    if(hasE){ const dot=document.createElement("div"); dot.className="edot"; el.appendChild(dot); }
    if(hasN){ const dot=document.createElement("div"); dot.className="ndot"; el.appendChild(dot); }
    el.addEventListener("click",()=>{ sel=new Date(calY,calM,d); renderCal(); renderDay(); });
    g.appendChild(el);
  }
  const rem = (7-((startDow+dim)%7))%7;
  for(let i=1;i<=rem;i++){
    const e=document.createElement("div"); e.className="cal-cell other";
    e.innerHTML=`<span class="cal-num">${i}</span><div class="cal-stripes"></div>`;
    g.appendChild(e);
  }
}
document.getElementById("prev-m").onclick=()=>{ calM--; if(calM<0){calM=11;calY--;} renderCal(); };
document.getElementById("next-m").onclick=()=>{ calM++; if(calM>11){calM=0;calY++;} renderCal(); };

/* ── Day view */
function renderDay(){
  const key=dkey(sel), dow=sel.getDay(), sched=SCHED[dow]||[];
  document.getElementById("d-name").textContent=DAY_N[dow];
  document.getElementById("d-date").textContent=sel.getDate()+" de "+MON_N[sel.getMonth()]+" "+sel.getFullYear();
  document.getElementById("tb-mid").innerHTML=`<strong>${DAY_N[dow]}</strong>, ${sel.getDate()} ${MON_S[sel.getMonth()]} ${sel.getFullYear()}`;
  document.getElementById("mob-lbl").textContent=DAY_N[dow]+" "+sel.getDate();
  const c=document.getElementById("day-content"); c.innerHTML="";
  // Note
  if(st.notes[key]!==undefined) c.appendChild(buildNote(key));
  // Exams
  (st.exams[key]||[]).forEach((ex,i)=>c.appendChild(buildExamAlert(key,ex.name,i)));
  // Schedule
  if(!sched.length){
    const fd=document.createElement("div"); fd.className="free-day"; fd.textContent="Día libre — descansá bien 🌿"; c.appendChild(fd);
  } else {
    const t=document.createElement("div"); t.className="sched-title"; t.textContent="Cronograma del día"; c.appendChild(t);
    sched.forEach(b=>{
      const card=document.createElement("div"); card.className="sched-card "+b.t;
      card.innerHTML=`<span class="sc-icon">${b.ic}</span><div class="sc-body"><div class="sc-title">${b.ti}</div><div class="sc-sub">${b.sub}</div></div><span class="sc-tag">${b.tag}</span><span class="sc-time">${fmt(b.s)} – ${fmt(b.e)}</span>`;
      c.appendChild(card);
    });
  }
  renderSbExams();
}

function buildNote(key){
  const d=document.createElement("div"); d.className="note-card";
  d.innerHTML=`<div class="note-hdr"><span class="note-lbl">📝 Nota del día</span><button class="note-del-b">✕</button></div><textarea class="note-ta" placeholder="Escribí tu nota acá...">${st.notes[key]||""}</textarea>`;
  d.querySelector(".note-ta").addEventListener("input",e=>{ st.notes[key]=e.target.value; saveSt(); renderCal(); });
  d.querySelector(".note-del-b").addEventListener("click",()=>{ delete st.notes[key]; saveSt(); renderDay(); renderCal(); });
  return d;
}
function buildExamAlert(key,name,idx){
  const d=document.createElement("div"); d.className="exam-alert";
  d.innerHTML=`<span class="ea-icon">📋</span><div class="ea-info"><div class="ea-lbl">EXAMEN</div><div class="ea-name">${name}</div></div><button class="ea-del">✕</button>`;
  d.querySelector(".ea-del").addEventListener("click",()=>{ st.exams[key].splice(idx,1); if(!st.exams[key].length) delete st.exams[key]; saveSt(); renderDay(); renderCal(); });
  return d;
}

/* ── Sidebar exams */
function renderSbExams(){
  const list=document.getElementById("sb-exams"); list.innerHTML="";
  const tk=dkey(today);
  const entries=Object.entries(st.exams).filter(([k])=>k>=tk).sort(([a],[b])=>a.localeCompare(b));
  if(!entries.length){ list.innerHTML=`<div class="empty-msg">Sin exámenes cargados</div>`; return; }
  entries.forEach(([key,exams])=>{
    exams.forEach((ex,i)=>{
      const chip=document.createElement("div"); chip.className="echip";
      chip.innerHTML=`<span class="echip-date">${fmtS(key)}</span><span class="echip-name">${ex.name}</span><button class="cdel">✕</button>`;
      chip.querySelector(".cdel").addEventListener("click",e=>{ e.stopPropagation(); st.exams[key].splice(i,1); if(!st.exams[key].length) delete st.exams[key]; saveSt(); renderSbExams(); renderCal(); if(key===dkey(sel)) renderDay(); });
      chip.addEventListener("click",()=>{ const[y,m,d]=key.split("-"); sel=new Date(parseInt(y),parseInt(m)-1,parseInt(d)); calY=sel.getFullYear(); calM=sel.getMonth(); renderCal(); renderDay(); });
      list.appendChild(chip);
    });
  });
}

/* ── Actions */
function toggleNote(){
  const key=dkey(sel);
  if(st.notes[key]!==undefined) return;
  st.notes[key]=""; saveSt(); renderDay(); renderCal();
  setTimeout(()=>{ const ta=document.querySelector(".note-ta"); if(ta) ta.focus(); },50);
}
function openExamModal(){
  document.getElementById("ex-date").value=dkey(sel);
  document.getElementById("ex-name").value="";
  document.getElementById("exam-modal").classList.add("open");
  setTimeout(()=>document.getElementById("ex-name").focus(),50);
}
function closeModal(){ document.getElementById("exam-modal").classList.remove("open"); }
function saveExam(){
  const name=document.getElementById("ex-name").value.trim();
  const date=document.getElementById("ex-date").value;
  if(!name||!date) return;
  if(!st.exams[date]) st.exams[date]=[];
  st.exams[date].push({name}); saveSt(); closeModal();
  if(date===dkey(sel)) renderDay();
  renderCal();
}
document.getElementById("exam-modal").addEventListener("click",e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
document.getElementById("ex-name").addEventListener("keydown",e=>{ if(e.key==="Enter") saveExam(); });

document.getElementById("today-btn").onclick=()=>{ sel=new Date(today); calY=today.getFullYear(); calM=today.getMonth(); renderCal(); renderDay(); };
document.getElementById("theme-btn").onclick=()=>{ darkMode=!darkMode; localStorage.setItem("ag3_theme",darkMode?"dark":"light"); applyTheme(); };
function applyTheme(){ document.documentElement.setAttribute("data-theme",darkMode?"dark":"light"); document.getElementById("theme-btn").textContent=darkMode?"☀":"☾"; }

function moveDay(dir){ sel.setDate(sel.getDate()+dir); if(sel.getMonth()!==calM||sel.getFullYear()!==calY){calM=sel.getMonth();calY=sel.getFullYear();} renderCal(); renderDay(); }
document.getElementById("mob-prev").onclick=()=>moveDay(-1);
document.getElementById("mob-next").onclick=()=>moveDay(1);

renderCal(); renderDay(); renderSbExams();
</script>
</body>
</html>
